# 개발용 docker-compose.
# 호스트 5200 → 컨테이너 5432 (Postgres)
# 호스트 8200 → 컨테이너 8000 (Django dev server)
#
# 사용:
#   docker-compose up -d           # 백그라운드 실행
#   docker-compose logs -f back    # 로그 보기
#   docker-compose exec back python manage.py migrate
#   docker-compose exec back python manage.py createsuperuser
#   docker-compose down            # 종료
#   docker-compose down -v         # 종료 + 데이터 삭제

services:
  db:
    image: postgres:16-alpine
    container_name: vibe-db
    environment:
      POSTGRES_DB: ${DB_NAME:-vibe}
      POSTGRES_USER: ${DB_USER:-vibe}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vibe_dev_password}
    ports:
      - "5200:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-vibe}"]
      interval: 5s
      timeout: 3s
      retries: 5

  back:
    build: ./back
    container_name: vibe-back
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8200:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-prod}
      DB_NAME: ${DB_NAME:-vibe}
      DB_USER: ${DB_USER:-vibe}
      DB_PASSWORD: ${DB_PASSWORD:-vibe_dev_password}
      DB_HOST: db
      DB_PORT: 5432
      DEBUG: "True"
    volumes:
      - ./back:/app
      - ./front:/front:ro     # seed_event 가 /front/public/data/events.json 읽음 (read-only)
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
