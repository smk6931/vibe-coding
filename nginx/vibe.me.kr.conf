# vibe.me.kr — Vite/React SPA static hosting
# 배포: server.py가 /etc/nginx/sites-available/vibe.me.kr 로 업로드 후 sites-enabled 심볼릭 링크.
# SSL: Let's Encrypt (certbot certonly --webroot, 자동 갱신은 certbot.timer가 처리).

# :80 — HTTPS 리다이렉트 (단, ACME challenge는 평문 유지해야 갱신 가능)
server {
    listen 80;
    listen [::]:80;
    server_name vibe.me.kr www.vibe.me.kr;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/vibe;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://vibe.me.kr$request_uri;
    }
}

# :443 — HTTPS 본체
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name vibe.me.kr www.vibe.me.kr;

    ssl_certificate     /etc/letsencrypt/live/vibe.me.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vibe.me.kr/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # www → apex 리다이렉트
    if ($host = www.vibe.me.kr) {
        return 301 https://vibe.me.kr$request_uri;
    }

    root /var/www/vibe;
    index index.html;

    # 보안 헤더 (게이트키핑용 최소 세트)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 정적 자산 캐시
    location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|webp|ico|woff2?)$ {
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    # SPA fallback (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 404/50x
    error_page 404 /index.html;
}
